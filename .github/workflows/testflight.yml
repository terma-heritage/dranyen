name: iOS TestFlight

# Manual: run from the Actions tab when you want a new TestFlight build.
on:
  workflow_dispatch:

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_API_ISSUER }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_API_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_API_KEY }}
      BUNDLE_ID: net.termaheritage.dramnyenTuner
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Apple CI tooling
        run: pip3 install --break-system-packages codemagic-cli-tools

      - name: Flutter dependencies
        run: flutter pub get

      - name: Set up signing (cert + profile auto-created via the API key)
        run: |
          keychain initialize
          app-store-connect bundle-ids create "$BUNDLE_ID" --name "Dramnyen Tuner" --platform IOS || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build signed IPA
        run: flutter build ipa --release --build-number=${{ github.run_number }} --export-options-plist="$HOME/export_options.plist"

      - name: Upload to TestFlight
        run: app-store-connect publish --path "$(find "$(pwd)/build" -name '*.ipa' | head -1)" --testflight

      - name: Save IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dramnyen-tuner-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore
